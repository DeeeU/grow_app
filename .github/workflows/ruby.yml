name: Ruby
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
permissions:
  contents: read
jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        ruby-version: ["3.3.0"]
    steps:
      - uses: actions/checkout@v4
      # Rubyを手動でインストール
      - name: Install Ruby
        run: |
          curl -fsSL https://github.com/rbenv/ruby-build/archive/refs/heads/master.tar.gz | tar -xz
          PREFIX=/usr/local ./ruby-build-master/bin/ruby-build ${{ matrix.ruby-version }} $HOME/.rubies/ruby-${{ matrix.ruby-version }}
          echo "$HOME/.rubies/ruby-${{ matrix.ruby-version }}/bin" >> $GITHUB_PATH
          export PATH=$HOME/.rubies/ruby-${{ matrix.ruby-version }}/bin:$PATH
          ruby --version

      # Bundlerをインストールして確認
      - name: Install Bundler
        run: |
          export PATH=$HOME/.rubies/ruby-${{ matrix.ruby-version }}/bin:$PATH
          gem install bundler
          which bundle
          bundle --version

      # 依存関係をインストール
      - name: Install dependencies
        run: |
          export PATH=$HOME/.rubies/ruby-${{ matrix.ruby-version }}/bin:$PATH
          bundle install

      - name: Fix Chrome for system tests
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser
          export CHROME_BIN=/usr/bin/chromium-browser
          echo "CHROME_BIN=/usr/bin/chromium-browser" >> $GITHUB_ENV

      # テスト実行
      - name: Run tests
        run: |
          export PATH=$HOME/.rubies/ruby-${{ matrix.ruby-version }}/bin:$PATH
          bundle exec rake
